<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.9"/>
    </filter>
    <filter id="inner-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#ff0000" flood-opacity="0.3"/>
    </filter>

    <radialGradient id="coin-base" cx="50%" cy="50%" r="50%">
      <stop offset="30%" stop-color="#1a0000" />
      <stop offset="80%" stop-color="#0d0000" />
      <stop offset="100%" stop-color="#030000" />
    </radialGradient>
    
    <linearGradient id="metal-red" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#ff1a1a" />
      <stop offset="40%" stop-color="#b30000" />
      <stop offset="80%" stop-color="#660000" />
      <stop offset="100%" stop-color="#330000" />
    </linearGradient>

    <linearGradient id="text-red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff3333" />
      <stop offset="50%" stop-color="#cc0000" />
      <stop offset="100%" stop-color="#800000" />
    </linearGradient>
  </defs>

  <g filter="url(#drop-shadow)">
    <path d="M 300,20 
             A 280,280 0 1 0 300,580 
             A 280,280 0 1 0 300,20 Z 
             M 225,225 H 375 V 375 H 225 Z" 
          fill="url(#coin-base)" fill-rule="evenodd" />

    <g stroke="#330000" stroke-width="2" fill="none" opacity="0.6">
      <rect x="130" y="130" width="340" height="340" transform="rotate(0 300 300)"/>
      <rect x="130" y="130" width="340" height="340" transform="rotate(45 300 300)"/>
    </g>
    <circle cx="300" cy="300" r="235" fill="none" stroke="#4d0000" stroke-width="1" stroke-dasharray="4 8" />
    <circle cx="300" cy="300" r="190" fill="none" stroke="#660000" stroke-width="2" stroke-dasharray="1 6" opacity="0.5" />
    <circle cx="300" cy="300" r="160" fill="none" stroke="#330000" stroke-width="4" stroke-dasharray="15 10" />

    <g fill="#ff1a1a" filter="url(#glow)" opacity="0.8">
      <polygon points="420,170 430,180 420,190 410,180" />
      <polygon points="420,410 430,420 420,430 410,420" />
      <polygon points="180,410 190,420 180,430 170,420" />
      <polygon points="180,170 190,180 180,190 170,180" />
    </g>

    <circle cx="300" cy="300" r="268" fill="none" stroke="url(#metal-red)" stroke-width="18" filter="url(#inner-shadow)" />
    <circle cx="300" cy="300" r="253" fill="none" stroke="#4d0000" stroke-width="4" />

    <rect x="210" y="210" width="180" height="180" fill="none" stroke="url(#metal-red)" stroke-width="16" filter="url(#inner-shadow)" />
    <rect x="223" y="223" width="154" height="154" fill="none" stroke="#2a0000" stroke-width="4" />

    <path d="M 120,200 Q 150,230 140,260" stroke="#050000" stroke-width="3" fill="none" />
    <path d="M 460,450 Q 430,400 480,380" stroke="#050000" stroke-width="4" fill="none" />
    <path d="M 280,60 L 290,90 L 275,100" stroke="#4d0000" stroke-width="1.5" fill="none" />

    <g font-family="'STXingkai', 'KaiTi', 'Noto Serif SC', 'Source Han Serif SC', serif" 
       font-size="95" 
       font-weight="900" 
       fill="url(#text-red)" 
       stroke="#1a0000" 
       stroke-width="2" 
       filter="url(#glow)">
      <text x="300" y="145" text-anchor="middle" dominant-baseline="central">怪</text>
      <text x="300" y="465" text-anchor="middle" dominant-baseline="central">谈</text>
      <text x="465" y="310" text-anchor="middle" dominant-baseline="central">通</text>
      <text x="135" y="310" text-anchor="middle" dominant-baseline="central">宝</text>
    </g>
  </g>
</svg>