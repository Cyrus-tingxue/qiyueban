services:
  postgres:
    image: postgres:16-alpine
    container_name: touqi-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-touqi}
      - POSTGRES_USER=${POSTGRES_USER:-touqi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-touqi_change_me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-touqi} -d ${POSTGRES_DB:-touqi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: touqi-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-touqi}:${POSTGRES_PASSWORD:-touqi_change_me}@postgres:5432/${POSTGRES_DB:-touqi}
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-240}
      - FRONTEND_URL=${FRONTEND_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-4}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-1}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-60}
      - GUNICORN_MAX_REQUESTS=${GUNICORN_MAX_REQUESTS:-1000}
      - GUNICORN_MAX_REQUESTS_JITTER=${GUNICORN_MAX_REQUESTS_JITTER:-100}
    volumes:
      - ./data:/app/data
    expose:
      - "80"

  frontend:
    build: 
      context: ./frontend
      target: build
    container_name: touqi-frontend
    # 构建完成后将静态文件复制到共享卷并退出
    command: sh -c "mkdir -p /usr/share/nginx/html && cp -rf /app/dist/* /usr/share/nginx/html/"
    volumes:
      - frontend-dist:/usr/share/nginx/html

  nginx:
    image: nginx:alpine
    container_name: touqi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro

volumes:
  frontend-dist:
  postgres-data:
